apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: banking-dev-apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/kiendo96/banking-gitops.git'
    targetRevision: main
    path: banking-apps-argocd/kustomize/overlays/dev
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd
  syncPolicy:
    # automated:
    #   prune: true
    #   selfHeal: true
    syncOptions:
      - CreateNamespace=true
