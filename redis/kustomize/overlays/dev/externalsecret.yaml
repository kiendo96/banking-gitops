apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vault-redis-secret
  namespace: data
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: vault-redis-secret
    creationPolicy: Owner
  data:
    - secretKey: redis-password
      remoteRef:
        key: secret/redis
        property: redis-password
