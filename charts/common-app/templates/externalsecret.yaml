{{- if .Values.secret.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Release.Name }}-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: {{ .Release.Name }}-secret
    creationPolicy: Owner
  data:
    {{- range .Values.secret.data }}
    - secretKey: {{ .key }}
      remoteRef:
        key: {{ $.Values.secret.vaultPath | default (printf "banking/%s" $.Release.Name) }}
        property: {{ .remoteProperty }}
    {{- end }}
{{- end }}
