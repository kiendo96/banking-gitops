apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: account-service
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/kiendo96/banking-gitops.git'
    targetRevision: HEAD
    path: account-service/kustomize/overlays/dev
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: apps
  syncPolicy:
    automated:
      prune: true
    syncOptions:
      - CreateNamespace=true
