apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/kiendo96/banking-gitops.git'
    targetRevision: main
    path: vault/kustomize/overlays/dev
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: vault
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
  ignoreDifferences:
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
      name: vault-agent-injector-cfg
      jqPathExpressions:
        - .webhooks[].clientConfig.caBundle
