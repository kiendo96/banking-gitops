apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: banking-kong
  namespace: argocd
spec:
  project: default
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jsonPointers:
        - /spec/versions/0/selectableFields
        - /spec/versions/1/selectableFields
  source:
    repoURL: "https://github.com/kiendo96/banking-gitops.git"
    targetRevision: HEAD
    path: kustomize/base/generated/kong
  destination:
    server: "https://kubernetes.default.svc"
    namespace: kong
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
