apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: banking-redis
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://github.com/kiendo96/banking-gitops.git"
    targetRevision: HEAD
    path: kustomize/base/generated/redis
  destination:
    server: "https://kubernetes.default.svc"
    namespace: data
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
