apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: vault-postgres-secret
  namespace: data
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: vault-postgres-secret
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: secret/postgres
        property: password
    - secretKey: repmgr-password
      remoteRef:
        key: secret/postgres
        property: repmgr-password
